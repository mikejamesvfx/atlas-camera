name: Publish to Comfy registry

# Publishes to registry.comfy.org whenever the version field in pyproject.toml
# changes on main. To ship a release: bump `version` in pyproject.toml, commit,
# push to main. Requires a repo secret named exactly REGISTRY_ACCESS_TOKEN
# (Settings -> Secrets and variables -> Actions), set to a publisher API key
# generated at registry.comfy.org.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The paths filter above fires on ANY pyproject.toml edit (e.g. adding
      # an extra), and the registry 400s on a duplicate version — so gate the
      # publish on the `version = ` line actually changing in this push.
      # workflow_dispatch always publishes (the manual escape hatch).
      - name: Did the version change?
        id: version_changed
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || ! git cat-file -e "$BASE" 2>/dev/null; then
            BASE="HEAD^"
          fi
          if git diff "$BASE" HEAD -- pyproject.toml | grep -qE '^\+version\s*='; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "pyproject.toml changed but not its version line — skipping publish."
          fi
      - name: Publish Custom Node
        if: steps.version_changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}

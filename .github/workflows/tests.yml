name: tests

on:
  push:
    branches: [main, experimental, "release/**"]
  pull_request:

jobs:
  pytest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      # The core package has zero required runtime deps. [dev] adds
      # numpy/opencv/pytest; [ui,image] cover the FastAPI backend tests
      # (httpx2 is starlette's TestClient transport). Torch-dependent tests
      # skip via importorskip, so this exercises the deterministic core,
      # node plumbing, and every exporter on both OSes per push —
      # verified against a fresh torch-less venv before this workflow
      # was committed (316 passed / 77 skipped).
      - run: pip install -e ".[dev,ui,image]" httpx2
      - run: python -m pytest -q
      # Clean-env node-pack load: the registry + all six responsibility modules
      # must import and register on a torch-less install (node classes import
      # torch lazily). Catches an import regression in a module that no test
      # imports directly.
      #
      # DELIBERATELY NOT a hardcoded node count. These steps used to assert
      # ==67 / ==71 and went stale the moment nodes were added, turning CI red
      # for a week on a drift no local `pytest -q` could reproduce — the magic
      # number lived only in this YAML. The exact registry surface (every key
      # and display name) is pinned by tests/test_comfy_node_registry.py, which
      # the step above already runs; duplicating the count here bought nothing
      # and broke on its own. What is genuinely NOT covered by that test is the
      # torch-less import, so that is all these steps check.
      - name: node pack registers (default)
        run: |
          python -c "
          from atlas_camera.comfy import NODE_CLASS_MAPPINGS as m, NODE_DISPLAY_NAME_MAPPINGS as d
          from atlas_camera.comfy.node_registry import EXPERIMENTAL_NODE_CLASS_MAPPINGS as x
          assert m, 'registry is empty'
          assert set(d) == set(m), f'display-name drift: {set(d) ^ set(m)}'
          leaked = sorted(set(x) & set(m))
          assert not leaked, f'experimental nodes leaked into the default tier: {leaked}'
          print('standard nodes:', len(m))
          "
      - name: experimental gate registers
        env:
          ATLAS_EXPERIMENTAL: "1"
        run: |
          python -c "
          from atlas_camera.comfy import NODE_CLASS_MAPPINGS as m, NODE_DISPLAY_NAME_MAPPINGS as d
          from atlas_camera.comfy.node_registry import EXPERIMENTAL_NODE_CLASS_MAPPINGS as x
          assert set(d) == set(m), f'display-name drift: {set(d) ^ set(m)}'
          missing = sorted(set(x) - set(m))
          assert not missing, f'gate did not register: {missing}'
          print('with experimental:', len(m), f'(+{len(x)})')
          "
